<section class="record-header" data-area="{{ area_slug }}">
  <span>
    <p class="eyebrow">{{ eyebrow }}</p>
    <h1>{{ confirm_title }}</h1>
    <p>{{ record }}</p>
  </span>
</section>

<form class="confirm-actions" method="post">
  {% csrf_token %}
  <button class="button button--danger ant-btn ant-btn-dangerous" type="submit">Delete</button>
  <a class="button button--secondary ant-btn ant-btn-default" href="{% url cancel_url %}" hx-boost="true" hx-target="#portal-main" hx-push-url="true">Cancel</a>
</form>
