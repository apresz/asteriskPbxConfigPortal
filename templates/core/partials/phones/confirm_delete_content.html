<section class="detail-panel" data-area="phones">
  <p class="eyebrow">Phone</p>
  <h1>Delete {{ phone.mac_address }}</h1>
  <p>This removes {{ phone.sep_identifier }}, its line appearances, and its speed dials.</p>
  <form class="confirm-actions" method="post">
    {% csrf_token %}
    <button class="button button--danger" type="submit">Delete</button>
    <a class="button button--secondary" href="{% url 'phones' %}" hx-boost="true" hx-target="#portal-main" hx-push-url="true">Cancel</a>
  </form>
</section>
