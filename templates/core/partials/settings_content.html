<section data-area="settings">
  <div class="page-heading">
    <p class="eyebrow">Settings</p>
    <h1>Admin Areas</h1>
    <p>Protected portal destinations for access, automation, audit, and archive administration.</p>
  </div>

  <div class="area-grid">
    {% for item in settings_links %}
      <a class="area-card" href="{% url item.slug %}" hx-boost="true" hx-target="#portal-main" hx-push-url="true">
        <span>
          <h2>{{ item.area.label }}</h2>
          <p>{{ item.area.summary }}</p>
        </span>
        <span class="area-card__status">{{ item.area.status }}</span>
      </a>
    {% endfor %}
  </div>
</section>
