<section class="detail-panel" data-area="extensions">
  <p class="eyebrow">Extension</p>
  <h1>Delete {{ extension.number }}</h1>
  <p>This removes {{ extension.display_name }} and its direct extension memberships.</p>
  <form class="confirm-actions" method="post">
    {% csrf_token %}
    <button class="button button--danger" type="submit">Delete</button>
    <a class="button button--secondary" href="{% url 'extensions' %}" hx-boost="true" hx-target="#portal-main" hx-push-url="true">Cancel</a>
  </form>
</section>
