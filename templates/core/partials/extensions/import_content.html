<section class="record-header" data-area="extensions">
  <span>
    <p class="eyebrow">Extensions</p>
    <h1>Import Extensions</h1>
  </span>
  <span class="button-row">
    <a class="button button--secondary ant-btn ant-btn-default" href="{% url 'extension-template' %}">CSV Template</a>
    <a class="button button--secondary ant-btn ant-btn-default" href="{% url 'extensions' %}" hx-boost="true" hx-target="#portal-main" hx-push-url="true">Extensions</a>
  </span>
</section>

{% if import_result %}
  <section class="notice-panel ant-alert notice-panel--success">
    <p>{{ import_result }}</p>
  </section>
{% endif %}

{% if import_errors %}
  <section class="notice-panel ant-alert notice-panel--error">
    <h2>Import Errors</h2>
    <ul>
      {% for error in import_errors %}
        <li>{{ error }}</li>
      {% endfor %}
    </ul>
  </section>
{% endif %}

<form class="import-form ant-form" method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <label class="form-field ant-form-item" for="id_csv_file">
    <span>CSV file</span>
    <input class="form-control ant-input" id="id_csv_file" name="csv_file" type="file" accept=".csv,text/csv">
  </label>
  <div class="form-actions">
    <button class="button ant-btn ant-btn-primary" type="submit">Import</button>
  </div>
</form>
