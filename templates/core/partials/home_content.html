<section class="page-heading" data-area="dashboard">
  <p class="eyebrow">Operations</p>
  <h1>Dashboard</h1>
  <p>Location health, live PBX telemetry, configuration drift, and deployment history across managed sites.</p>
</section>

{% include "core/partials/dashboard_panel.html" %}

<section class="area-grid" aria-label="Portal areas">
  {% for slug, area in areas.items %}
    <a class="area-card" href="{% url slug %}" hx-boost="true" hx-target="#portal-main" hx-push-url="true">
      <span>
        <h2>{{ area.label }}</h2>
        <p>{{ area.summary }}</p>
      </span>
      <span class="area-card__status">{{ area.status }}</span>
    </a>
  {% endfor %}
</section>
