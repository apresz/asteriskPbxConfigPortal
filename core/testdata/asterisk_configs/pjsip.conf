; Generated by PBX Config Portal for HQ
; PJSIP TCP endpoints and provider trunks

[global]
type=global
user_agent=PBXConfigPortal-hq

[transport-tcp]
type=transport
protocol=tcp
bind=10.30.0.10:5060
local_net=10.30.0.0/24

[3000]
type=endpoint
transport=transport-tcp
context=from-pjsip
disallow=all
allow=ulaw,alaw
auth=auth-3000
aors=aor-3000
callerid="HQ Reception" <3000>
direct_media=no
force_rport=yes
rewrite_contact=yes
deny=0.0.0.0/0.0.0.0
permit=10.30.0.0/255.255.255.0
mailboxes=3000@default

[auth-3000]
type=auth
auth_type=userpass
username=3000
password=sip-secret-3000

[aor-3000]
type=aor
max_contacts=5
remove_existing=yes

[3001]
type=endpoint
transport=transport-tcp
context=from-pjsip
disallow=all
allow=ulaw,alaw
auth=auth-3001
aors=aor-3001
callerid="Lab Phone" <3001>
direct_media=no
force_rport=yes
rewrite_contact=yes
deny=0.0.0.0/0.0.0.0
permit=10.30.0.0/255.255.255.0

[auth-3001]
type=auth
auth_type=userpass
username=3001
password=sip-secret-3001

[aor-3001]
type=aor
max_contacts=5
remove_existing=yes

[trunk-emergency-sip]
type=endpoint
transport=transport-tcp
context=inbound
disallow=all
allow=ulaw,alaw
outbound_auth=auth-trunk-emergency-sip
aors=aor-trunk-emergency-sip
direct_media=no
from_domain=sip.emergency.example.test
; Provider ACL requires a static IP/CIDR host to emit permit rules.

[auth-trunk-emergency-sip]
type=auth
auth_type=userpass
username=emergency
password=emergency-secret

[aor-trunk-emergency-sip]
type=aor
max_contacts=1
contact=sip:sip.emergency.example.test

[identify-trunk-emergency-sip]
type=identify
endpoint=trunk-emergency-sip
match=sip.emergency.example.test

[trunk-primary-sip]
type=endpoint
transport=transport-tcp
context=inbound
disallow=all
allow=ulaw,alaw
outbound_auth=auth-trunk-primary-sip
aors=aor-trunk-primary-sip
direct_media=no
from_domain=sip.primary.example.test
; Provider ACL requires a static IP/CIDR host to emit permit rules.

[auth-trunk-primary-sip]
type=auth
auth_type=userpass
username=primary-user
password=primary-secret

[aor-trunk-primary-sip]
type=aor
max_contacts=1
contact=sip:sip.primary.example.test

[identify-trunk-primary-sip]
type=identify
endpoint=trunk-primary-sip
match=sip.primary.example.test
