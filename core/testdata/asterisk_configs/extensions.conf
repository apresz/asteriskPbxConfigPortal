; Generated by PBX Config Portal for HQ
; Dialplan

[globals]
LOCAL_PBX=hq
RECORDING_RETENTION_DAYS=45

[from-pjsip]
include => emergency
include => local-extensions
include => remote-extensions
include => feature-codes
include => voicemail
include => paging
include => outbound

[from-iax2]
include => local-extensions
include => inbound

[local-extensions]
exten => 3000,1,NoOp(Local extension 3000 HQ Reception)
 same => n,Gosub(recording-hooks,s,1(extension,3000,always))
 same => n,Dial(PJSIP/3000,30)
 same => n,VoiceMail(3000@default,u)
 same => n,Hangup()

exten => 3001,1,NoOp(Local extension 3001 Lab Phone)
 same => n,Dial(PJSIP/3001,30)
 same => n,Hangup()

[remote-extensions]
exten => 4000,1,NoOp(Remote extension 4000 owned by warehouse)
 same => n,Dial(IAX2/warehouse/${EXTEN},30)
 same => n,Hangup()

[inbound]
exten => +15551203000,1,NoOp(Inbound DID +15551203000)
 same => n,Goto(local-extensions,3000,1)

[outbound]
exten => _NXXNXXXXXX,1,NoOp(Outbound route Local Outbound)
 same => n,Set(CALLERID(num)=+15551203000)
 same => n,Dial(PJSIP/${EXTEN}@trunk-primary-sip,60)
 same => n,Hangup()

[emergency]
exten => 911/3001,1,NoOp(Emergency calling disabled for extension 3001)
 same => n,Playback(ss-noservice)
 same => n,Hangup(21)

exten => 911,1,NoOp(Emergency route Emergency)
 same => n,Set(CALLERID(num)=+15551203999)
 same => n,Dial(PJSIP/${EXTEN}@trunk-emergency-sip,60)
 same => n,Hangup()

[voicemail]
exten => *97,1,VoiceMailMain(${CALLERID(num)}@default)
 same => n,Hangup()
exten => *98,1,VoiceMailMain(@default)
 same => n,Hangup()

[paging]
exten => 7100,1,NoOp(Page HQ Page)
 same => n,Page(PJSIP/3000)
 same => n,Hangup()

[feature-codes]
exten => *98,1,NoOp(Feature code *98 Voicemail)
 same => n,VoiceMailMain(@default)
 same => n,Hangup()

[ivrs]
[ring-groups]
[queues]
exten => support-queue,1,NoOp(Queue Support Queue)
 same => n,Gosub(recording-hooks,s,1(queue,support-queue,on_demand))
 same => n,Queue(support-queue,t,,,45)
 same => n,Goto(local-extensions,3000,1)
 same => n,Hangup()

[recording-hooks]
exten => s,1,NoOp(Recording policy ${ARG3} for ${ARG1}-${ARG2})
 same => n,GotoIf($["${RECORDING_ACTIVE}"="1"]?done)
 same => n,Set(__RECORDING_ACTIVE=1)
 same => n,Set(__RECORDING_SOURCE=${ARG1}-${ARG2})
 same => n,Set(__RECORDING_POLICY=${ARG3})
 same => n,Set(__RECORDING_FILE=${UNIQUEID}-${LOCAL_PBX}-${RECORDING_SOURCE}-${RECORDING_POLICY}.wav)
 same => n,Set(CDR(userfield)=recording_file=${RECORDING_FILE} recording_source=${RECORDING_SOURCE} recording_policy=${RECORDING_POLICY})
 same => n,MixMonitor(/var/spool/asterisk/monitor/${RECORDING_FILE},b)
 same => n(done),Return()
