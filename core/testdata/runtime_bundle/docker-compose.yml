services:
  asterisk:
    build:
      context: ./runtime/asterisk
      args:
        ASTERISK_VERSION: "${ASTERISK_VERSION:-20.19.0}"
        ASTERISK_SOURCE_URL: "${ASTERISK_SOURCE_URL:-https://downloads.asterisk.org/pub/telephony/asterisk/old-releases/asterisk-20.19.0.tar.gz}"
        ASTERISK_SOURCE_SHA256: "${ASTERISK_SOURCE_SHA256:-10fbc070f9aaec50b788962dbcddf694fcc61d49c1f1bb158bf04a2e7e46aba0}"
        CISCO_PATCH_URL: "${CISCO_PATCH_URL:-https://raw.githubusercontent.com/usecallmanagernz/patches/master/asterisk/cisco-usecallmanager-20.19.0.patch}"
        CISCO_PATCH_SHA256: "${CISCO_PATCH_SHA256:-adcb88c17a1cf8eb6242c7d9f1959f06afc64ae9af210268abaf767d388b83d2}"
    image: ${PBX_ASTERISK_IMAGE:-pbx-asterisk:20.19.0-cisco}
    container_name: pbx-${PBX_LOCATION_SLUG:-version-hq}-asterisk
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: ${TZ:-America/Los_Angeles}
      ASTERISK_UID: ${ASTERISK_UID:-1000}
      ASTERISK_GID: ${ASTERISK_GID:-1000}
    volumes:
      - ./asterisk:/etc/asterisk:ro
      - ./scripts/pbx-recording-retention:/usr/local/sbin/pbx-recording-retention:ro
      - asterisk-lib:/var/lib/asterisk
      - ./asterisk/sounds:/var/lib/asterisk/sounds:ro
      - asterisk-log:/var/log/asterisk
      - asterisk-spool:/var/spool/asterisk

  tftp:
    image: ${PBX_TFTP_IMAGE:?PBX_TFTP_IMAGE must include an immutable digest}
    container_name: pbx-${PBX_LOCATION_SLUG:-version-hq}-tftp
    restart: unless-stopped
    ports:
      - "${PROVISIONING_TFTP_PORT:-69}:69/udp"
    volumes:
      - ./tftp:/srv/tftp:ro

  provisioning-http:
    image: ${PBX_HTTP_IMAGE:-docker.io/nginx:1.27-alpine}
    container_name: pbx-${PBX_LOCATION_SLUG:-version-hq}-http
    restart: unless-stopped
    ports:
      - "${PROVISIONING_HTTP_PORT:-80}:80/tcp"
    volumes:
      - ./tftp:/usr/share/nginx/html/cisco:ro

  pbx-agent:
    image: ${PBX_AGENT_IMAGE:?PBX_AGENT_IMAGE must include an immutable digest}
    container_name: pbx-${PBX_LOCATION_SLUG:-version-hq}-agent
    restart: unless-stopped
    network_mode: host
    environment:
      PBX_LOCATION_SLUG: ${PBX_LOCATION_SLUG:-version-hq}
      PBX_LAN_IP: ${PBX_LAN_IP:-10.30.0.10}
      PBX_WARP_IP: ${PBX_WARP_IP:-100.64.30.10}
      TZ: ${TZ:-America/Los_Angeles}
      PBX_AGENT_WS_URL: "${PBX_AGENT_WS_URL:?PBX_AGENT_WS_URL is required}"
      PBX_AGENT_TOKEN: "${PBX_AGENT_TOKEN:?PBX_AGENT_TOKEN is required}"
      PBX_AGENT_SECRET: "${PBX_AGENT_SECRET:?PBX_AGENT_SECRET is required}"
      PBX_ACTIVE_CONFIG_MARKER: ${PBX_ACTIVE_CONFIG_MARKER:-/etc/asterisk/pbx-active-config.json}
      ASTERISK_AMI_HOST: ${ASTERISK_AMI_HOST:-127.0.0.1}
      ASTERISK_AMI_PORT: ${ASTERISK_AMI_PORT:-5038}
      ASTERISK_AMI_USERNAME: "${ASTERISK_AMI_USERNAME:?ASTERISK_AMI_USERNAME is required}"
      ASTERISK_AMI_SECRET: "${ASTERISK_AMI_SECRET:?ASTERISK_AMI_SECRET is required}"
      ASTERISK_CDR_CSV_PATH: ${ASTERISK_CDR_CSV_PATH:-/var/log/asterisk/cdr-csv/Master.csv}
      ASTERISK_CEL_CSV_PATH: ${ASTERISK_CEL_CSV_PATH:-/var/log/asterisk/cel-custom/Master.csv}
      ASTERISK_RECORDING_ROOT: ${ASTERISK_RECORDING_ROOT:-/var/spool/asterisk/monitor}
      PBX_AGENT_TELEMETRY_INTERVAL_SECONDS: ${PBX_AGENT_TELEMETRY_INTERVAL_SECONDS:-60}
      PORTAL_API_BASE_URL: ${PORTAL_API_BASE_URL:-}
    volumes:
      - ./asterisk:/etc/asterisk:ro
      - asterisk-log:/var/log/asterisk:ro
      - asterisk-spool:/var/spool/asterisk:ro
    depends_on:
      - asterisk

volumes:
  asterisk-lib:
  asterisk-log:
  asterisk-spool:
